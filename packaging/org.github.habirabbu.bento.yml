app-id: org.github.habirabbu.bento
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: bento

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --talk-name=org.kde.kglobalaccel
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=xdg-config/bento:create

modules:
  # dbus-python has C extensions that link against libdbus — build from source
  - name: dbus-python
    buildsystem: autotools
    sources:
      - type: archive
        url: https://dbus.freedesktop.org/releases/dbus-python/dbus-python-1.3.2.tar.gz
        sha256: ad67819308618b5069537571f7f0de35e0e3a9c5c3741e167e19a014dbc58e64

  - name: python3-requests
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} --no-build-isolation requests
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/63/70/2bf7780ad2d390a8d301ad0b550f1581eadbd9a20f896afe06353c2a2913/requests-2.32.3-py3-none-any.whl
        sha256: 70761cfe03c773ceb22aa2f671b4757976145175cdfca038c02654d061d6dcc6
      - type: file
        url: https://files.pythonhosted.org/packages/ca/1c/89ffc63a9605b583d5df2be791a27bc1a42b7c32bab68d3c8f2f73a98571/urllib3-2.2.3-py3-none-any.whl
        sha256: ca899ca043dcb1bafa3e262d73aa25c465bfb49e0bd9dd5d59f1d0acba2f8fac
      - type: file
        url: https://files.pythonhosted.org/packages/76/c6/c88e154df9c4e1a2a66ccf0005a88dfb2650c1dffb6f5ce603dfbd452ce3/idna-3.10-py3-none-any.whl
        sha256: 946d195a0d259cbba61165e88e65941f16e9b36ea6ddb97f00452bae8b1287d3
      - type: file
        url: https://files.pythonhosted.org/packages/12/90/3c9ff0512038035f59d279fddeb79f5f1eccd8859f06d6163c58798b9487/certifi-2024.8.30-py3-none-any.whl
        sha256: 922820b53db7a7257ffbda3f597266d435245903d80737e34f8a45ff3e3230d8
      - type: file
        url: https://files.pythonhosted.org/packages/2a/53/cf0a48de1bdcf6ff6e1c9a023f5f523dfe303e4024f216feac64b6eb7f67/charset_normalizer-3.3.2-py3-none-any.whl
        sha256: 3e4d1f6587322d2788836a99c69062fbb091331ec940e02d12d179c1d53e25fc

  - name: python3-python-dotenv
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} --no-build-isolation python-dotenv
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/64/07/91a7eb38e8520aa29ebe5f48157d1cb3570991bdb6573fae3ef5c1906a80/python_dotenv-1.0.1-py3-none-any.whl
        sha256: f7b63ef50f1b690dddf550d03497b66d609393b40b564ed0d674909a68ebf16a

  - name: python3-PyQt6
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} --no-build-isolation PyQt6 PyQt6-Qt6 PyQt6-sip
    sources:
      # NOTE: PyQt6 and PyQt6-Qt6 wheels are x86_64 only.
      # For aarch64 builds, these must be compiled from source.
      - type: file
        url: https://files.pythonhosted.org/packages/e5/c2/6ca08b3ed5b06642191f165f8a5f0dfe4e29e9e6ce81aac31e562c381e56/PyQt6-6.7.1-cp38-abi3-manylinux_2_28_x86_64.whl
        sha256: 3672a82ccd3a62e99ab200a13903421e2928e399fda25ced98d140313ad59cb9
      - type: file
        url: https://files.pythonhosted.org/packages/e0/f4/0e5e36b77cd1ddacb30ecc7b8a189dba1a7b42d8afe2a1fb1ebd4a40596c/PyQt6_Qt6-6.7.3-manylinux_2_28_x86_64.whl
        sha256: 85bdb436d27050339de69bb05afba1f21ddec0e2f1be5d4bbf7e56c134b2a844
      # NOTE: PyQt6-sip is pinned to cp312; update the wheel URL when
      # targeting a different CPython minor version.
      - type: file
        url: https://files.pythonhosted.org/packages/98/23/e54e02a44f1b2b078620b63e8db13248e8354c0a76e4a0bba4e703394346/PyQt6_sip-13.8.1-cp312-cp312-manylinux_2_5_x86_64.manylinux1_x86_64.whl
        sha256: c370a29d7e36d5c7bb2b495a5a4443ba44e78e04750766c6c4e85bcfabe8e37e

  - name: bento
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} --no-build-isolation --no-deps .
      - install -Dm644 packaging/bento.desktop
        ${FLATPAK_DEST}/share/applications/org.github.habirabbu.bento.desktop
      - install -Dm644 bento_app/assets/icon.svg
        ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/org.github.habirabbu.bento.svg
      - |
        for size in 16 24 32 48 64 128 256 512; do
          install -Dm644 "bento_app/assets/bento-icon-${size}.png" \
            "${FLATPAK_DEST}/share/icons/hicolor/${size}x${size}/apps/org.github.habirabbu.bento.png"
        done
      - install -Dm644 packaging/org.github.habirabbu.bento.metainfo.xml
        ${FLATPAK_DEST}/share/metainfo/org.github.habirabbu.bento.metainfo.xml
    sources:
      - type: dir
        path: ..
    post-install:
      # Patch desktop file to use the Flatpak app-id for the icon
      - desktop-file-edit --set-key=Icon
        --set-value=org.github.habirabbu.bento
        ${FLATPAK_DEST}/share/applications/org.github.habirabbu.bento.desktop
